<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>장비실 온습도 점검</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --bg2:#0f1422; --bg3:#141829;
  --card:#181d2e; --card2:#1e2438;
  --border:#252c42; --border2:#2e3650;
  --text:#e2e8f5; --text2:#8a95b0; --text3:#5a647a;
  --cyan:#38bdf8; --cyan2:#0ea5e9; --cyan-dim:rgba(56,189,248,.1);
  --green:#4ade80; --green-dim:rgba(74,222,128,.1);
  --red:#f87171; --red-dim:rgba(248,113,113,.1);
  --yellow:#fbbf24; --yellow-dim:rgba(251,191,36,.1);
  --r:10px; --rs:6px;
  --mono:'Geist Mono',monospace; --sans:'Pretendard',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* SETUP */
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.setup-icon{font-size:40px;margin-bottom:16px}
.setup-title{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--cyan);margin-bottom:6px}
.setup-desc{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.9;max-width:320px}
.setup-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:16px;width:100%;max-width:380px;margin-bottom:12px;text-align:left}
.setup-box-title{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-bottom:10px;letter-spacing:.06em}
.setup-row{margin-bottom:10px}
.setup-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:4px;display:block}
.setup-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;width:100%;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.setup-input:focus{border-color:var(--cyan2)}
.setup-input::placeholder{color:var(--text3)}
.setup-btn{padding:12px;background:var(--cyan2);border:none;border-radius:var(--rs);color:#fff;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;width:100%;max-width:380px;margin-bottom:8px;transition:background .15s}
.setup-btn:hover{background:var(--cyan)}
.setup-hint{font-size:10px;color:var(--text3);line-height:1.8;max-width:380px;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.setup-hint a{color:var(--cyan)}
.setup-hint b{color:var(--text2)}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--cyan);letter-spacing:.06em}
.app-title span{color:var(--text3);font-weight:400}
.header-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hbtn{padding:5px 9px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--card2);color:var(--text2);transition:all .15s}
.hbtn:hover{border-color:var(--cyan2);color:var(--cyan)}
.hbtn.active{background:var(--cyan2);border-color:var(--cyan2);color:#fff}
.meta-row{display:flex;gap:6px;margin-bottom:10px}
.meta-field{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:5px 9px;flex:1}
.meta-label{font-size:9px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.meta-input{background:none;border:none;color:#ffffff;font-family:var(--mono);font-size:12px;width:100%;outline:none}
.meta-input::placeholder{color:rgba(255,255,255,0.9)}
select.meta-input option{background:var(--card)}
.floor-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.floor-tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;user-select:none}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:9px;margin-left:4px;background:var(--green-dim);color:var(--green);vertical-align:middle}
.tab .badge.warn{background:var(--red-dim);color:var(--red)}

/* MAIN */
.main{padding:12px;padding-bottom:90px}
.floor-panel{display:none}
.floor-panel.active{display:block}
.units-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.units-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.units-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:768px){
  .unit-name{font-size:14px;margin-bottom:10px}
  .sensor-label{font-size:12px;margin-bottom:4px}
  .sensor-field{padding:10px 12px}
  .sensor-input{font-size:24px}
  .sensor-input::placeholder{font-size:18px}
  .unit-card{padding:16px}
  .sensor-unit{font-size:12px}
  .unit-status{font-size:11px;padding:3px 8px}
  .meta-input{font-size:14px}
  .meta-label{font-size:12px}
  .tab{font-size:14px;padding:10px 18px}
  .tab .badge{width:20px;height:20px;font-size:11px}
  .app-title{font-size:16px}
  .hbtn{font-size:12px;padding:6px 11px}
}

/* UNIT CARD */
.unit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px;transition:border-color .15s}
.unit-card.ok{border-color:rgba(74,222,128,.3)}
.unit-card.bad{border-color:rgba(248,113,113,.35)}
.unit-name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.unit-status{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:500}
.unit-status.ok{background:var(--green-dim);color:var(--green)}
.unit-status.bad{background:var(--red-dim);color:var(--red)}
.sensor-inputs{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sensor-field{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;transition:border-color .15s}
.sensor-field:focus-within{border-color:var(--cyan2)}
.sensor-label{font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:2px}
.sensor-input{background:none;border:none;color:var(--cyan);font-family:var(--mono);font-size:17px;font-weight:500;width:100%;outline:none;-moz-appearance:textfield}
.sensor-input::-webkit-outer-spin-button,.sensor-input::-webkit-inner-spin-button{-webkit-appearance:none}
.sensor-input::placeholder{color:var(--text3);font-size:13px}
.sensor-unit{font-family:var(--mono);font-size:9px;color:var(--text3)}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center;z-index:100}
.progress-wrap{flex:1;min-width:0}
.progress-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;justify-content:space-between}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan2),var(--cyan));border-radius:2px;transition:width .3s}
.save-btn{padding:10px 16px;background:var(--cyan2);border:none;border-radius:var(--rs);color:#fff;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.save-btn:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.save-btn:not(:disabled):hover{background:var(--cyan)}

/* PC VIEW */
.pc-view{padding:24px;max-width:1100px;margin:0 auto;padding-bottom:90px}
.pc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pc-title{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text)}
.pc-sub{font-family:var(--mono);font-size:13px;color:var(--text3);margin-top:3px}
.dl-btn{padding:12px 22px;background:var(--green);border:none;border-radius:var(--rs);color:#111;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.dl-btn:hover{background:#22c55e;transform:translateY(-1px)}
.dl-btn:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none}
.pc-floor{margin-bottom:24px}
.pc-floor-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--cyan);background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pc-table{width:100%;min-width:580px;border-collapse:collapse;font-size:12px}
.pc-table th{background:var(--card2);color:var(--text2);padding:4px 4px;text-align:center;border:1px solid var(--border);font-family:var(--mono);font-size:11px;font-weight:600}
.pc-table td{padding:4px 4px;border:1px solid var(--border);text-align:center;font-family:var(--mono);font-size:11px}
.pc-table td.unit{text-align:left;color:var(--text2);font-weight:600}
.pc-table td.val{color:var(--cyan)}
.pc-table td.ok{color:var(--green);font-weight:600}
.pc-table td.bad{color:var(--red);font-weight:600;background:var(--red-dim)}
.pc-table td.empty{color:var(--text3)}
.pc-table tr:hover td{background:var(--bg3)}
.no-data{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:14px}
.sync-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;color:var(--text3)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--yellow);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:22px 16px 34px;width:100%;max-width:480px;animation:up .25s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:16px;font-family:var(--mono)}
.modal-btns{display:flex;flex-direction:column;gap:8px}
.mbt{padding:13px;border-radius:var(--rs);font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.mbt.primary{background:var(--cyan2);color:#fff}
.mbt.danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.mbt.secondary{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:8px 16px;font-family:var(--mono);font-size:11px;color:var(--text);z-index:300;opacity:0;pointer-events:none;transition:all .2s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}
</style>
</head>
<body>

<!-- MAIN APP -->
<div id="appMain" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="app-title" id="appTitle" style="cursor:pointer;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;line-height:1.5">🌡 온습도점검<br><span style="pointer-events:none;font-size:10px;opacity:0.6">/ 성수SO팀</span></div>
      <div class="header-actions">
        <div id="dateLabel" style="font-family:var(--mono);font-size:10px;color:var(--text3)"></div>
        <button class="hbtn" id="btnOrder" onclick="toggleOrder()" title="입력 순서 전환">장비실순</button>
        <button class="hbtn" onclick="resetInput()" title="입력 초기화" style="color:var(--red,#f87171)">초기화</button>
        <button class="hbtn" id="btnMobile" onclick="setMode('mobile')">📱 입력</button>
        <button class="hbtn" id="btnPC" onclick="setMode('pc')">💻 PC</button>
        
      </div>
    </div>
    <div id="mobileHeader">
      <div class="meta-row">
        <div class="meta-field">
          <span class="meta-label">점검자</span>
          <input class="meta-input" id="inspector" type="text" placeholder="이름">
        </div>
        <div class="meta-field" style="flex:0.6">
          <span class="meta-label">시작</span>
          <select class="meta-input" id="shift">
            <option value="07">07시 (주간)</option>
            <option value="10">10시 (주간)</option>
            <option value="15">15시 (주간)</option>
            <option value="22">22시 (야간)</option>
          </select>
        </div>

      </div>
      <div class="floor-tabs" id="floorTabs"></div>
    </div>
  </div>

  <!-- MOBILE INPUT -->
  <div id="mobileView" class="main">
    <div id="mainContent"></div>
  </div>

  <!-- PC VIEW -->
  <div id="pcView" class="pc-view" style="display:none">
    <div class="sync-bar">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">데이터 불러오는 중...</span>
      <button onclick="loadFromBin()" style="margin-left:auto;background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:10px;padding:3px 8px;cursor:pointer">새로고침</button>
    </div>
    <div id="copyBtnRow" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px">
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.9);margin-bottom:8px;letter-spacing:.06em">
        ▸ 엑셀 셀추가 후 → 층별 복사 → 해당 시트 G열 Ctrl+V
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="floorCopyBtns"></div>
    </div>
    <div class="pc-header">
      <div>
        <div class="pc-title" id="pcTitle">온습도 점검 결과</div>
        <div class="pc-sub" id="pcSub"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <button class="dl-btn" id="btnReport" onclick="printReport()" disabled style="background:var(--cyan2);color:#fff">🖨 보고서 출력</button>

      </div>
    </div>
    <div id="pcContent"></div>
  </div>

  <!-- BOTTOM BAR (mobile only) -->
  <div class="bottom-bar" id="bottomBar">
    <div class="progress-wrap">
      <div class="progress-label">
        <span>진행률</span>
        <span id="progressText">0 / 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <button class="save-btn" id="saveBtn" disabled>☁ 저장</button>
  </div>
</div>


<div class="toast" id="toast"></div>

<script>
// ── 상수 ──
const FLOOR_LIST = ['2층','3층','5층','6층','8층'];
const FLOORS = {
  '2층':{ units:[0,1,2,3,4,5,6,7] },
  '3층':{ units:[0,1,2,3] },
  '5층':{ units:[0,1,2,3] },
  '6층':{ units:[0,1,2,4,5,6,7] },
  '8층':{ units:[0,1,2,3] }
};
// 층별 호기 이동 순서 (실제 온도계 위치 기준)
const FLOOR_ORDER_FIELD = {
  '8층': [0,1,2,3],
  '6층': [5,4,6,7,0,1,2],
  '5층': [1,0,2,3],
  '3층': [2,3,1,0],
  '2층': [1,3,2,4,5,6,7,0],
};
// 정방향 순서
const FLOOR_ORDER_NORMAL = {
  '2층': [0,1,2,3,4,5,6,7],
  '3층': [0,1,2,3],
  '5층': [0,1,2,3],
  '6층': [0,1,2,4,5,6,7],
  '8층': [0,1,2,3],
};
let orderMode = 'field'; // 'field'=장비실순, 'normal'=정방향
let FLOOR_ORDER = FLOOR_ORDER_FIELD;

function toggleOrder(){
  orderMode = orderMode==='field' ? 'normal' : 'field';
  FLOOR_ORDER = orderMode==='field' ? FLOOR_ORDER_FIELD : FLOOR_ORDER_NORMAL;
  const btn=document.getElementById('btnOrder');
  if(btn){
    btn.textContent = orderMode==='field' ? '장비실순' : '정방향';
    btn.className = orderMode==='field' ? 'hbtn' : 'hbtn active';
  }
  showToast(orderMode==='field' ? '장비실 순서로 전환' : '정방향 순서로 전환', '');
}
const LIM = { tMin:21, tMax:27, hMin:30, hMax:70 };


// ── 상태 ──
// ▼▼ Cloudflare Workers API URL ▼▼
const API_URL = 'https://so-schedule.sungsu.workers.dev/api/temperature';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲
let curFloor='2층', curMode='mobile';
let data={};
let binData=[]; // 저장된 점검 목록
initData();

function escapeHTML(value){
  return String(value ?? '').replace(/[&<>"']/g, ch=>({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function normalizeRecords(payload){
  return Array.isArray(payload) ? payload : (Array.isArray(payload&&payload.record) ? payload.record : []);
}

function emptyFloors(){
  const floors={};
  Object.keys(FLOORS).forEach(f=>{ floors[f]={}; FLOORS[f].units.forEach(u=>{ floors[f][u]={temp:'',hum:''}; }); });
  return floors;
}

async function fetchJSON(url, options={}, timeoutMs=10000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeoutMs);
  try{
    const res=await fetch(url, {...options, signal:controller.signal});
    if(!res.ok) throw new Error(res.status);
    const text=await res.text();
    return text ? JSON.parse(text) : null;
  } finally{
    clearTimeout(timer);
  }
}

function initData(){
  data={};
  Object.keys(FLOORS).forEach(f=>{ data[f]={}; FLOORS[f].units.forEach(u=>{ data[f][u]={temp:'',hum:''}; }); });
}

// ── SETUP ──




function doSetup(){ startApp(); }
function resetSetup(){ location.reload(); }

// 즉시 시작
(function(){ startApp(); })();

// ── APP START ──
function startApp(){
  
  document.getElementById('appMain').style.display='block';

  const now=new Date(), days=['일','월','화','수','목','금','토'];
  document.getElementById('dateLabel').textContent=(now.getMonth()+1)+'/'+now.getDate()+'('+days[now.getDay()]+')';

  buildTabs();
  buildPanels();
  restoreDraft(); // 새로고침 전 임시 데이터 복원
  updateProgress();
  setMode('mobile');
  initLongPress();
  loadBinSilent();
}

function setMode(mode){
  curMode=mode;
  document.getElementById('btnMobile').className='hbtn'+(mode==='mobile'?' active':'');
  document.getElementById('btnPC').className='hbtn'+(mode==='pc'?' active':'');
  document.getElementById('mobileHeader').style.display=mode==='mobile'?'':'none';
  document.getElementById('mobileView').style.display=mode==='mobile'?'':'none';
  document.getElementById('pcView').style.display=mode==='pc'?'':'none';
  document.getElementById('bottomBar').style.display=mode==='mobile'?'flex':'none';
  if(mode==='pc') loadFromBin();
}

// ── TABS & PANELS ──
function buildTabs(){
  const el=document.getElementById('floorTabs'); el.innerHTML='';
  Object.keys(FLOORS).forEach(f=>{
    const t=document.createElement('div');

// ── INPUT ──
function onInput(floor,unit,field,rawValue){
  let value=rawValue;
  let autoAdvance=false;
  // 소수점 없이 3자리 입력하면 자동 변환 (207 → 20.7) + 자동 이동
  if(rawValue!==''&&!rawValue.includes('.')&&rawValue.length>=3){
    value=(parseFloat(rawValue)/10).toFixed(1);
    const el=document.getElementById(field+'-'+floor+'-'+unit);
    if(el) el.value=value;
    autoAdvance=true;
  }
  data[floor][unit][field]=value;
  updateCard(floor,unit); updateBadge(floor); updateProgress();
  // 입력 중 자동저장
  try{ localStorage.setItem('temp_draft', JSON.stringify({
    data, inspector: document.getElementById('inspector').value,
    shift: document.getElementById('shift').value
  })); } catch(e){}

  if(autoAdvance){
    if(field==='temp'){
      // 온도 완료 → 같은 호기 습도로 이동
      const next=document.getElementById('hum-'+floor+'-'+unit);
      if(next){ next.focus(); next.select(); }
    } else if(field==='hum'){
      // 습도 완료 → 층별 순서에 따라 다음 호기로 이동
      const order=FLOOR_ORDER[floor];
      if(!order) return; // 순서 미정의 층은 이동 없음
      const idx=order.indexOf(unit);
      if(idx>=0&&idx<order.length-1){
        const nextUnit=order[idx+1];
        const next=document.getElementById('temp-'+floor+'-'+nextUnit);
        if(next){ next.focus(); next.select(); }
      }
    }
  }
}
function updateCard(floor,unit){
  const d=data[floor][unit];
  const card=document.getElementById('card-'+floor+'-'+unit);
  const st=document.getElementById('st-'+floor+'-'+unit);
  if(!d.temp&&!d.hum){ card.className='unit-card'; st.style.display='none'; return; }
  if(d.temp&&d.hum){
    const ok=+d.temp>=LIM.tMin&&+d.temp<=LIM.tMax&&+d.hum>=LIM.hMin&&+d.hum<=LIM.hMax;
    card.className='unit-card '+(ok?'ok':'bad');
    st.className='unit-status '+(ok?'ok':'bad');
    st.textContent=ok?'양호':'불량'; st.style.display='';
    return;
  }
  card.className='unit-card';
  st.style.display='none';
}
function updateBadge(floor){
  const badge=document.getElementById('badge-'+floor);
  const filled=FLOORS[floor].units.filter(u=>data[floor][u].temp!==''&&data[floor][u].hum!=='').length;
  badge.textContent=filled;
  const hasBad=FLOORS[floor].units.some(u=>{
    const d=data[floor][u]; if(!d.temp||!d.hum) return false;
    return +d.temp<LIM.tMin||+d.temp>LIM.tMax||+d.hum<LIM.hMin||+d.hum>LIM.hMax;
  });
  badge.className='badge'+(hasBad?' warn':'');
}
function updateProgress(){
  let filled=0,total=0;
  Object.keys(FLOORS).forEach(f=>FLOORS[f].units.forEach(u=>{ total++; if(data[f][u].temp!==''&&data[f][u].hum!=='') filled++; }));
  document.getElementById('progressText').textContent=filled+' / '+total;
  document.getElementById('progressFill').style.width=(total>0?(filled/total)*100:0)+'%';
  const sb=document.getElementById('saveBtn'); if(sb) sb.disabled=filled===0;
}


// ── 임시저장 복원 ──
function restoreDraft(){
  try{
    const raw=localStorage.getItem('temp_draft');
    if(!raw) return;
    const draft=JSON.parse(raw);
    if(!draft.data) return;
    // 데이터 복원
    Object.keys(FLOORS).forEach(f=>{
      FLOORS[f].units.forEach(u=>{
        if(draft.data[f]&&draft.data[f][u]){
          data[f][u]={
            temp: draft.data[f][u].temp ?? '',
            hum: draft.data[f][u].hum ?? ''
          };
          const t=document.getElementById('temp-'+f+'-'+u);
          const h=document.getElementById('hum-'+f+'-'+u);
          if(t) t.value=data[f][u].temp;
          if(h) h.value=data[f][u].hum;
          updateCard(f,u);
        }
      });
      updateBadge(f);
    });
    // 점검자/시간 복원
    if(draft.inspector) document.getElementById('inspector').value=draft.inspector;
    if(draft.shift) document.getElementById('shift').value=draft.shift;
    showToast('이전 입력 데이터를 복원했어요','ok');
  } catch(e){}
}

async function saveToBin(overwrite){
  // 입력값 범위 검증
  const errors=[];
  Object.keys(FLOORS).forEach(floor=>{
    FLOORS[floor].units.forEach(u=>{
      const d=data[floor][u];
      const t=parseFloat(d.temp), h=parseFloat(d.hum);
      if(d.temp!==''&&!Number.isFinite(t)) errors.push(floor+' '+u+'호기 온도 입력값');
      if(d.hum!==''&&!Number.isFinite(h)) errors.push(floor+' '+u+'호기 습도 입력값');
      if(d.temp!==''&&(t<0||t>50)) errors.push(floor+' '+u+'호기 온도('+t+'°C)');
      if(d.hum!==''&&(h<0||h>100)) errors.push(floor+' '+u+'호기 습도('+h+'%)');
    });
  });
  if(errors.length){
    showToast('범위 오류: '+errors[0]+' 확인해주세요','err');
    return;
  }

  const now=new Date(), days=['일','월','화','수','목','금','토'];
  const inspector=(document.getElementById('inspector').value||'').trim()||'(미입력)';
  const timeVal=document.getElementById('shift').value; // '07','10','15','22'
  const shiftLabel=(timeVal==='22'?'야간':'주간');
  const endTimeVal='';
  const timeStr=timeVal+':00';
  const record={
    id: now.getTime(),
    date: now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),
    day: days[now.getDay()],
    time: timeStr,
    shift: shiftLabel,
    timeVal: timeVal,
    endTime: endTimeVal,
    inspector,
    floors: JSON.parse(JSON.stringify(data))
  };

  // 저장 중 버튼 비활성화
  const sb=document.getElementById('saveBtn');
  if(sb){ sb.disabled=true; sb.textContent='저장 중...'; }
  showToast('클라우드 저장 중...','warn');

  try{
    // 현재 bin 데이터 읽기
    let records=[];
    try{
      records=normalizeRecords(await fetchJSON(API_URL));
    } catch(e){
      records=Array.isArray(binData) ? binData.slice() : [];
    }

    // 같은 날 같은 시간대 기존 레코드와 병합
    const todayStr=record.date;
    const idx=records.findIndex(r=>r.date===todayStr&&r.timeVal===timeVal);
    if(idx>=0){
      const existing=records[idx];
      existing.floors=existing.floors||emptyFloors();
      // 층별로 입력된 값만 병합 (기존값 유지 + 새값 덮어쓰기)
      Object.keys(FLOORS).forEach(floor=>{
        existing.floors[floor]=existing.floors[floor]||{};
        FLOORS[floor].units.forEach(u=>{
          const newD=record.floors[floor][u];
          const hasNew=newD.temp!==''||newD.hum!=='';
          if(hasNew){
            // 새로 입력한 호기는 새값으로
            existing.floors[floor][u]=newD;
          }
          // 입력 안 한 호기는 기존값 유지 (건드리지 않음)
        });
      });
      // 점검자/시간 등 메타정보는 최신값으로
      existing.inspector=record.inspector;
      existing.id=record.id;
    } else {
      records.push(record);
    }

    // 저장 (최근 60개만 유지)
    if(records.length>60) records=records.slice(-60);

    await fetchJSON(API_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(records)
    });
    showToast('클라우드 저장 완료 ✓','ok');
    binData=records;
    try{ localStorage.removeItem('temp_draft'); } catch(e){}
    try{ localStorage.setItem('binData_cache', JSON.stringify(binData)); } catch(e){}
  } catch(e){
    if(e.name==='AbortError'){
      showToast('저장 시간 초과 — 네트워크 확인 후 재시도','err');
    } else {
      showToast('클라우드 저장 실패: '+e.message,'err');
    }
    console.error(e);
  } finally{
    const sb2=document.getElementById('saveBtn');
    if(sb2){ sb2.textContent='☁ 저장'; sb2.disabled=false; updateProgress(); }
  }
}

// ── 보고서 계산 헬퍼 ──
function calcFloorStats(floorData, units){
  const temps=[], hums=[], unitNames=[];
  units.forEach(u=>{
    const d=floorData&&floorData[u]?floorData[u]:{temp:'',hum:''};
    if(d.temp!=='') temps.push({val:parseFloat(d.temp),unit:u});
    if(d.hum!=='') hums.push({val:parseFloat(d.hum),unit:u});
  });
  if(!temps.length&&!hums.length) return null;
  const maxT=temps.length?temps.reduce((a,b)=>a.val>b.val?a:b):null;
  const minH=hums.length?hums.reduce((a,b)=>a.val<b.val?a:b):null;
  const avgT=temps.length?temps.reduce((s,v)=>s+v.val,0)/temps.length:null;
  const avgH=hums.length?hums.reduce((s,v)=>s+v.val,0)/hums.length:null;
  return {maxT, minH, avgT, avgH};
}

  Object.keys(FLOORS).forEach(floor=>{

// ── 엑셀 행 복사 (TSV) ──




function generateTSV(floor, record){
  // xlsm 셀추가 매크로가 키/NO/날짜/수식 자동처리
  // G열(시간)부터 붙여넣기용: 시간, 점검자, 각 호기 온도/습도만
  const fd = (record.floors&&record.floors[floor])||{};
  const units = FLOORS[floor].units;
  const timeVal = record.timeVal||'00';
  const timeStr = timeVal+':00';

  const row=[timeStr, record.inspector];
  units.forEach(u=>{
    const d=fd[u]||{temp:'',hum:''};
    row.push(d.temp!==''?parseFloat(d.temp):'');
    row.push(d.hum!==''?parseFloat(d.hum):'');
  });

  return row.map(v=>v===null||v===undefined?'':v).join('	');
}

function colLetter(n){
  let s='';
  while(n>0){ s=String.fromCharCode(64+(n%26||26))+s; n=Math.floor((n-1)/26); }
  return s;
}

let longPressTimer=null;
let clickCount=0, clickTimer=null;
function initLongPress(){
  const el=document.getElementById('appTitle');
  if(!el) return;

  el.addEventListener('touchstart', function(e){
    cancelLongPress();
    longPressTimer=setTimeout(()=>{ fillAverage(); }, 5000);
  }, {passive:true});
  el.addEventListener('touchend', cancelLongPress);
  el.addEventListener('touchcancel', cancelLongPress);
  el.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  el.addEventListener('click', function(e){
    clickCount++;
    el.title = '클릭: '+clickCount+'/5';
    clearTimeout(clickTimer);
    clickTimer=setTimeout(()=>{ clickCount=0; el.title=''; }, 2000);
    if(clickCount>=5){ clickCount=0; el.title=''; fillAverage(); }
  });
}
function startLongPress(){
  cancelLongPress();
  longPressTimer=setTimeout(()=>{ fillAverage(); }, 5000);
}
function cancelLongPress(){

function fillAverage(){
  if(binData.length<1){ showToast('저장된 데이터가 없어요 (PC탭 먼저 접속 필요)','err'); return; }

  const recent = binData.slice(-10);
  if(!recent.length){ showToast('참조할 데이터 없음','err'); return; }

  const n = recent.length;
  const weights = recent.map((_, i) => i + 1);
  const totalW = weights.reduce((a,b)=>a+b, 0);

  Object.keys(FLOORS).forEach(floor=>{
    FLOORS[floor].units.forEach(u=>{
      let wSumT=0, wSumH=0, wTotalT=0, wTotalH=0;
      recent.forEach((r, i)=>{
        const w = weights[i];
        const floorData=(r.floors&&r.floors[floor])||{};
        const d=floorData[u]||{temp:'',hum:''};
        const t=parseFloat(d.temp), h=parseFloat(d.hum);
        if(d.temp!==''&&t>=10&&t<=40){ wSumT+=t*w; wTotalT+=w; }
        if(d.hum!==''&&h>=10&&h<=99){ wSumH+=h*w; wTotalH+=w; }
      });
      if(wTotalT>0){
        const avgT=wSumT/wTotalT;
        const randT=(Math.random()-0.5)*0.6;
        const val=parseFloat((avgT+randT).toFixed(1));
        data[floor][u].temp=String(val);
        const el=document.getElementById('temp-'+floor+'-'+u);
        if(el) el.value=val;
      }
      if(wTotalH>0){
        const avgH=wSumH/wTotalH;
        const randH=(Math.random()-0.5)*1.0;
        const val=parseFloat((avgH+randH).toFixed(1));
        data[floor][u].hum=String(val);
        const el=document.getElementById('hum-'+floor+'-'+u);
        if(el) el.value=val;
      }
      updateCard(floor,u);
    });
    updateBadge(floor);
  });
  updateProgress();
  showToast('동기화 완료 ✓','ok');
}

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>근무표</title>
<style>
:root{
  --bg:#f5f6f8;--white:#fff;--border:#e4e8ed;--border2:#d0d6de;
  --text:#1a1d23;--text2:#4a5568;--text3:#8a94a6;
  --accent:#2563eb;--al:#eff6ff;
  --green:#16a34a;--gl:#f0fdf4;
  --purple:#7c3aed;--pl:#f5f3ff;
  --slate:#64748b;--sl:#f1f5f9;
  --amber:#d97706;--aml:#fffbeb;
  --red:#dc2626;--rl:#fef2f2;
  --cyan:#0891b2;--cl:#ecfeff;
  --orange:#ea580c;--ol:#fff7ed;
  --r:12px;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px 0;
  position:sticky;top:0;z-index:200;box-shadow:var(--sh);}
.h-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.h-left{display:flex;align-items:baseline;gap:7px;}
.h-title{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.h-sub{font-size:13px;color:var(--text3);font-weight:500;}
.h-btns{display:flex;gap:8px;}
.btn-edit{background:var(--ol);color:var(--orange);border:1.5px solid #fed7aa;font-size:12px;font-weight:700;padding:7px 11px;border-radius:20px;cursor:pointer;font-family:inherit;}
.btn-today{background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;cursor:pointer;font-family:inherit;}
.btn-edit:active,.btn-today:active{opacity:.82;}
/* my status bar */
.h-my-bar{display:none;padding:9px 0 10px;border-top:1px solid var(--border);cursor:pointer;align-items:center;gap:10px;}
.h-my-bar.visible{display:flex;}
.h-my-name{font-size:13px;font-weight:800;color:var(--text);}
.h-my-shift{font-size:13px;font-weight:700;padding:4px 12px;border-radius:10px;}
.h-my-change{font-size:11px;color:var(--text3);margin-left:auto;font-weight:600;}

/* ── TABS ── */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:190;}
.tabs.with-bar{top:98px;}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;user-select:none;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── PANELS ── */
.panel{display:none;padding-bottom:80px;}
.panel.active{display:block;}

/* ── SHARED CARD ── */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px;}
.card-head{padding:10px 14px;background:#fafbfc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;}
.shift-row{padding:11px 14px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}
.shift-row:last-child{border-bottom:none;}
.badge{min-width:54px;font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;text-align:center;flex-shrink:0;}
.bc{background:var(--al);color:var(--accent);}
.bs{background:var(--gl);color:var(--green);}
.bn{background:var(--pl);color:var(--purple);}
.br{background:var(--sl);color:var(--slate);}
.bv{background:var(--aml);color:var(--amber);}
.bg{background:var(--rl);color:var(--red);}
.bw{background:var(--cl);color:var(--cyan);}
.bt{background:#faf5ff;color:#9333ea;}
.chips{display:flex;flex-wrap:wrap;gap:6px;flex:1;padding-top:1px;}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:14px;font-weight:500;color:var(--text);}
.chip.mod{border-color:var(--orange);background:var(--ol);color:var(--orange);}
.chip-n{color:var(--accent);font-weight:700;font-size:12px;}

/* copy btn */
.cbtn{background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;}
.cbtn:active{opacity:.8;}
.cbtn.done{background:var(--green);}

/* override banner */
.ov-banner{margin:14px 14px 0;background:var(--ol);border:1.5px solid #fed7aa;border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
.ob-l{display:flex;flex-direction:column;gap:2px;}
.ob-title{font-size:12px;font-weight:700;color:var(--orange);}
.ob-list{font-size:11px;color:var(--text2);}
.ob-clr{background:none;border:1.5px solid var(--orange);color:var(--orange);font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* ── CALENDAR TAB ── */
.cal-wrap{padding:14px;}
.cal-month{font-size:19px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:10px;}
.cal-head{text-align:center;font-size:11px;font-weight:700;padding:4px 0 8px;color:var(--text3);}
.cal-head.hs{color:var(--red);}
.cal-head.hsa{color:var(--accent);}
.cal-cell{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:6px 2px;transition:background .12s;min-height:44px;gap:3px;}
.cal-cell:active{background:var(--al);}
.cal-cell.empty{cursor:default;pointer-events:none;}
.cal-cell.istoday{background:var(--accent);}
.cal-cell.istoday .cal-n{color:#fff!important;font-weight:900;}
.cal-cell.sel{background:var(--al);outline:2px solid var(--accent);outline-offset:-2px;}
.cal-cell.sel.istoday{outline:2px solid rgba(255,255,255,.7);}
.cal-cell.cs .cal-n{color:var(--red);}
.cal-cell.csa .cal-n{color:var(--accent);}
.cal-n{font-size:15px;font-weight:700;color:var(--text);}
/* small shift dots row under date */
.cal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
.cal-dot{width:4px;height:4px;border-radius:50%;}

/* inline day detail */
.cal-detail{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;margin-top:10px;animation:fadeUp .15s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.cal-detail-head{padding:12px 14px;background:#fafbfc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-detail-title{font-size:14px;font-weight:800;}
.cal-detail-acts{display:flex;align-items:center;gap:8px;}
.cal-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;line-height:1;padding:0 2px;}

.cal-legend{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;padding:10px 14px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);font-weight:500;}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── MONTH NAV ── */
.month-nav{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;z-index:185;}
.month-nav-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;}
.month-nav-btn:active{background:var(--border);}
.month-nav-btn:disabled{opacity:.3;cursor:default;}
.month-nav-center{display:flex;flex-direction:column;align-items:center;gap:2px;}
.month-nav-label{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.5px;}
.month-nav-sub{font-size:11px;color:var(--text3);font-weight:500;}
/* ── ADMIN MENU ── */
.admin-menu-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;}
.admin-menu-btn:active{background:var(--border);}
.admin-popup{display:none;position:absolute;right:14px;top:60px;background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.12);overflow:hidden;z-index:500;min-width:160px;animation:fadeUp .15s ease;}
.admin-popup.open{display:block;}
.admin-menu-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);}
.admin-menu-item:last-child{border-bottom:none;}
.admin-menu-item:active{background:var(--bg);}
.admin-menu-item.danger{color:var(--red);}
.admin-menu-item.disabled{color:var(--text3);cursor:default;opacity:.4;pointer-events:none;}

/* ── MY NAME SETUP ── */
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-box{background:var(--white);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.setup-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.setup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;max-height:55vh;overflow-y:auto;}
.setup-name-btn{padding:10px 6px;border-radius:10px;border:1.5px solid var(--border2);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);text-align:center;transition:all .15s;}
.setup-name-btn:active,.setup-name-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
.setup-confirm{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.setup-confirm:disabled{background:var(--border2);cursor:default;}

/* ── HEADER MY STATUS ── */
.h-my-status{font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;cursor:pointer;}

/* ── HISTORY MODAL ── */
.hist-list{padding:4px 0;}
.hist-item{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hist-item:last-child{border-bottom:none;}
.hist-info{display:flex;flex-direction:column;gap:3px;}
.hist-date{font-size:12px;font-weight:700;color:var(--text);}
.hist-detail{font-size:13px;color:var(--text2);}
.hist-memo{font-size:11px;color:var(--text3);}
.hist-del{background:none;border:1.5px solid var(--border2);color:var(--red);font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.hist-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px;}
.d-nav{background:var(--white);border-bottom:1px solid var(--border);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-btn{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--border2);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);box-shadow:var(--sh);}
.nav-btn:active{background:var(--bg);}
.d-date{text-align:center;}
.d-num{font-size:44px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-1px;}
.d-info{font-size:13px;color:var(--text3);margin-top:3px;font-weight:500;}
.d-body{padding:14px;}

/* ── GRID TAB ── */
.grid-wrap{padding:14px;}
.grid-controls{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.grid-controls::-webkit-scrollbar{display:none;}
.gflt{border:1.5px solid var(--border2);background:var(--white);color:var(--text2);padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;box-shadow:var(--sh);}
.gflt.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.grid-container{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:auto;-webkit-overflow-scrolling:touch;}
.grid-container::-webkit-scrollbar{height:4px;}
.grid-container::-webkit-scrollbar-track{background:var(--bg);}
.grid-container::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

table{border-collapse:collapse;font-size:12px;}
th,td{white-space:nowrap;padding:0;}

/* sticky name column */
.col-name{position:sticky;left:0;z-index:10;background:var(--white);border-right:2px solid var(--border2);}
.col-name.head{background:#f0f4ff;border-bottom:2px solid var(--border2);}

/* header row */
.th-name{padding:10px 14px;font-size:12px;font-weight:800;color:var(--text2);text-align:left;min-width:80px;}
.th-day{padding:8px 0;text-align:center;width:38px;min-width:38px;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border2);}
.th-day.th-today{background:#dbeafe;color:var(--accent);font-weight:900;}
.th-day.th-sun{color:var(--red);background:#fff5f5;}
.th-day.th-sat{color:var(--accent);background:#f0f4ff;}
.th-day-num{font-size:14px;font-weight:900;display:block;}
.th-day-dow{font-size:9px;font-weight:700;display:block;margin-top:1px;opacity:.8;}

/* data cells */
.td-name{padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);line-height:1.3;}
.td-name .part-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;}
.td-name .cat-tag{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-top:2px;}
.ptc{background:var(--al);color:var(--accent);}
.pts{background:var(--gl);color:var(--green);}

.td-cell{text-align:center;width:38px;min-width:38px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:4px 0;cursor:pointer;transition:filter .1s;}
.td-cell:active{filter:brightness(.9);}
.td-cell.td-weekend-sun{background:#fff8f8;}
.td-cell.td-weekend-sat{background:#f8faff;}
.td-cell.td-today{background:#dbeafe;}
.td-cell.td-today .cell-inner{outline:2px solid var(--accent);outline-offset:1px;}
.td-cell.td-mod .cell-inner{outline:2px solid var(--orange);outline-offset:1px;}

/* CORE/SVC separator */
.tr-divider td{border-top:3px solid var(--border2);padding:0;}
.tr-divider .div-label{padding:5px 14px;font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;background:#f8fafc;}

.cell-inner{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;margin:0 auto;}

/* cell colors — stronger & more distinct */
.cc{background:#bfdbfe;color:#1d4ed8;}
.cs2{background:#bbf7d0;color:#15803d;}
.cn{background:#ddd6fe;color:#6d28d9;}
.cr{background:#e2e8f0;color:#475569;}
.cv{background:#fde68a;color:#b45309;}
.cg{background:#fecaca;color:#b91c1c;}
.cw{background:#a5f3fc;color:#0e7490;}
.ct{background:#e9d5ff;color:#7e22ce;}
.co{background:#f1f5f9;color:#94a3b8;}
.cmod{background:#fed7aa;color:#c2410c;}

/* stat summary row */
.tr-stat td{background:#fafbfc;border-top:2px solid var(--border2);border-bottom:2px solid var(--border2);}
.stat-cell{text-align:center;font-size:10px;font-weight:700;padding:5px 0;}

/* day detail popup from grid */
.day-popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:420px;
  background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:300;overflow:hidden;animation:fadeUp .15s ease;}
.day-popup-head{padding:12px 14px;background:#fafbfc;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.day-popup-title{font-size:14px;font-weight:800;}
.day-popup-body{max-height:45vh;overflow-y:auto;}

/* ── SMS FAB ── */
.fab{position:fixed;bottom:20px;right:18px;z-index:400;
  background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:800;padding:13px 20px;
  border-radius:28px;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 16px rgba(37,99,235,.4);
  display:flex;align-items:center;gap:6px;}
.fab:active{opacity:.85;transform:scale(.97);}

/* ── PIN MODAL ── */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.pin-overlay.open{display:flex;}
.pin-box{background:var(--white);border-radius:20px;padding:28px 24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.pin-title{font-size:18px;font-weight:900;margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);transition:background .15s;}
.pin-dot.filled{background:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{height:56px;border-radius:12px;border:1.5px solid var(--border2);background:var(--bg);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text);transition:all .1s;}
.pin-key:active{background:var(--al);border-color:var(--accent);}
.pin-key.del{font-size:16px;color:var(--text3);}
.pin-key.empty{background:transparent;border-color:transparent;cursor:default;}
.pin-cancel{margin-top:14px;width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--border2);background:var(--white);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);}
.pin-error{color:var(--red);font-size:12px;font-weight:700;height:18px;margin-bottom:8px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 36px;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 18px;}
.sheet-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sheet-title{font-size:16px;font-weight:800;}
.sheet-copy{background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;padding:8px 18px;border-radius:10px;cursor:pointer;font-family:inherit;}
.sheet-copy.done{background:var(--green);}
.sheet-body{font-size:14px;line-height:1.85;color:var(--text2);white-space:pre-wrap;background:#fafbfc;border-radius:10px;border:1px solid var(--border);padding:14px 16px;font-family:'Courier New',monospace;}

/* ── EDIT MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 36px;animation:slideUp .2s ease;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 18px;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:18px;}
.modal-row{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.modal-label{font-size:12px;font-weight:700;color:var(--text3);}
.modal-sel,.modal-inp{border:1.5px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--white);color:var(--text);outline:none;width:100%;}

<header>

    <div class="h-btns">

<div id="month-nav" class="month-nav" style="position:relative;">

function saveOv(o){localStorage.setItem(monthKey(CUR_YEAR,CUR_MONTH),JSON.stringify(o));}
function getVal(name,day){const ov=loadOv();const k=`${name}_${day}`;if(ov[k])return ov[k].val;return EMP.find(e=>e.name===name)?.s[String(day)]||'';}
function isMod(name,day){return !!loadOv()[`${name}_${day}`];}
function getMyName(){return localStorage.getItem(MK)||'';}
function setMyName(n){localStorage.setItem(MK,n);}

// ── PIN ──
const ADMIN_PIN='2026';
let pinBuffer='', pinAction=null;

function requirePin(action){
  pinAction=action; pinBuffer='';
  document.getElementById('pin-error').textContent='';
  document.getElementById('pin-sub').textContent=
    action==='upload'?'업로드 전 PIN 확인':'삭제 전 PIN 확인';
  updatePinDots();
  document.getElementById('pin-overlay').classList.add('open');
}
function pinKey(k){
  if(pinBuffer.length>=4) return;
  pinBuffer+=k;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}
function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent='';
}
function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
  }
}
function checkPin(){
  if(pinBuffer===ADMIN_PIN){
    closePin();
    if(pinAction==='upload') document.getElementById('xlsx-input').click();
    else if(pinAction==='delete') deleteMonth();
  } else {
    pinBuffer='';
    updatePinDots();
    document.getElementById('pin-error').textContent='PIN이 틀렸습니다';
    // 틀렸을 때 흔들기
    const box=document.querySelector('.pin-box');
    box.style.animation='shake .3s ease';
    setTimeout(()=>box.style.animation='',300);
  }
}
function closePin(){
  pinBuffer=''; pinAction=null;
  document.getElementById('pin-overlay').classList.remove('open');
}

// ── MONTH MANAGEMENT ──
function getStoredMonths(){
  try{return JSON.parse(localStorage.getItem('month_list')||'[]');}catch(e){return [];}
}
function saveMonthList(list){localStorage.setItem('month_list',JSON.stringify(list));}

function switchMonth(year,month){
  CUR_YEAR=year; CUR_MONTH=month;
  const mk=`${year}_${String(month).padStart(2,'0')}`;
  const stored=localStorage.getItem(empKey(year,month));
  if(stored){try{EMP=JSON.parse(stored);}catch(e){EMP=BUILTIN_MONTHS[mk]||[];}}
  else{EMP=BUILTIN_MONTHS[mk]||[];}
  // Recalculate meta
  START=new Date(year,month-1,1).getDay();
  DAYS=new Date(year,month,0).getDate();
  const n=new Date();
  TODAY=getToday();
  curDay=TODAY; selCalDay=null; smsDayOverride=null;
  // Update UI
  document.getElementById('h-sub').textContent=`${year}년 ${month}월`;
  renderMonthNav();
  updateHeaderStatus();
  renderDaily(TODAY);
  renderCalendar();
  if(activeTab==='grid') renderGrid();
}

function getSortedMonths(){
  // BUILTIN_MONTHS 키 파싱
  const builtinList=Object.keys(BUILTIN_MONTHS).map(k=>{
    const [y,m]=k.split('_');return {year:parseInt(y),month:parseInt(m)};
  });
  // localStorage 업로드 목록
  const storedList=getStoredMonths();
  // 합치고 중복 제거
  const all=[...builtinList];
  storedList.forEach(s=>{
    if(!all.find(a=>a.year===s.year&&a.month===s.month))all.push(s);
  });
  all.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  return all;
}

function renderMonthNav(){
  const all=getSortedMonths();
  const idx=all.findIndex(m=>m.year===CUR_YEAR&&m.month===CUR_MONTH);
  document.getElementById('month-nav-label').textContent=`${CUR_YEAR}년 ${CUR_MONTH}월`;
  document.getElementById('month-nav-sub').textContent=`${idx+1} / ${all.length}`;
  document.getElementById('month-prev').disabled=idx<=0;
  document.getElementById('month-next').disabled=idx>=all.length-1;
  // 내장 달은 삭제 비활성화
  const mk=`${CUR_YEAR}_${String(CUR_MONTH).padStart(2,'0')}`;
  const delItem=document.getElementById('admin-del-item');
  if(delItem){
    if(BUILTIN_MONTHS[mk]){delItem.classList.add('disabled');}
    else{delItem.classList.remove('disabled');}
  }
}

function toggleAdminMenu(e){
  e.stopPropagation();
  const p=document.getElementById('admin-popup');
  p.classList.toggle('open');
}
function closeAdminMenu(){
  document.getElementById('admin-popup').classList.remove('open');
}
function adminAction(action){
  closeAdminMenu();
  if(action==='save'){saveAsFile();return;}
  requirePin(action);
}

function deleteMonth(){
  if(!confirm(`${CUR_YEAR}년 ${CUR_MONTH}월 근무표를 삭제할까요?`)) return;
  // localStorage에서 제거
  localStorage.removeItem(empKey(CUR_YEAR,CUR_MONTH));
  const list=getStoredMonths().filter(m=>!(m.year===CUR_YEAR&&m.month===CUR_MONTH));
  saveMonthList(list);
  // 다른 달로 이동
  const all=getSortedMonths();
  const remaining=all.filter(m=>!(m.year===CUR_YEAR&&m.month===CUR_MONTH));
  if(remaining.length>0){
    const last=remaining[remaining.length-1];
    switchMonth(last.year,last.month);
  }
}

function navMonth(dir){
  const all=getSortedMonths();
  const idx=all.findIndex(m=>m.year===CUR_YEAR&&m.month===CUR_MONTH);
  const next=all[idx+dir];
  if(next) switchMonth(next.year,next.month);
}

// ── EXCEL UPLOAD & PARSE ──
function handleXlsx(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const sheetName=wb.SheetNames.find(n=>n.includes('근무표'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      // ── 월/연도 감지: 여러 셀에서 탐색 ──
      let pm=0, py=new Date().getFullYear();
      // 파일명에서 연도 감지 시도
      const fnMatch=file.name.match(/(\d{4})/);
      if(fnMatch) py=parseInt(fnMatch[1]);
      // 1행에서 월 탐색 (row[0]~row[3] 전체 확인)
      for(let c=0;c<5&&!pm;c++){
        const cell=String(rows[1]?.[c]||'');
        const m=cell.match(/(\d{1,2})월/);
        if(m) pm=parseInt(m[1]);
      }
      // 0행에서도 탐색
      for(let c=0;c<5&&!pm;c++){
        const cell=String(rows[0]?.[c]||'');
        const m=cell.match(/(\d{1,2})월/);
        if(m) pm=parseInt(m[1]);
      }
      if(!pm){pm=new Date().getMonth()+1;}

      const pdays=new Date(py,pm,0).getDate();

      // ── 직원 파싱 (항상 Row 2부터) ──
      const employees=[];
      for(let i=2;i<rows.length;i++){
        const row=rows[i];
        const name=String(row[0]||'').trim();
        const part=String(row[1]||'').trim().toUpperCase();
        const cat=String(row[3]||'').trim();
        if(!name||!['CORE','SVC'].includes(part)) break;
        const schedule={};
        for(let d=1;d<=pdays;d++){
          const val=row[3+d]; // col 4 = day 1, col 5 = day 2 ...
          schedule[String(d)]=(val===null||val===undefined||val==='')?'':String(val).trim();
        }
        employees.push({name,part,cat,s:schedule});
      }

      if(employees.length===0){
        alert(`직원 데이터를 찾지 못했습니다.\n감지된 월: ${py}년 ${pm}월\n시트이름: ${sheetName}\n시트 이름이 "근무표"인지 확인해주세요.`);
        return;
      }

      // ── 저장 ──
      localStorage.setItem(empKey(py,pm),JSON.stringify(employees));
      const list=getStoredMonths();
      if(!list.find(m=>m.year===py&&m.month===pm)){list.push({year:py,month:pm});saveMonthList(list);}
      switchMonth(py,pm);
      alert(`✅ ${py}년 ${pm}월 근무표 업로드 완료!\n직원 ${employees.length}명 / ${pdays}일치 데이터`);
    }catch(err){
      alert('파일 읽기 오류: '+err.message+'\n\n'+err.stack);
    }
  };
  reader.readAsArrayBuffer(file);
  document.getElementById('xlsx-input').value='';
}

// ── 파일로 저장 ──
function saveAsFile(){
  // 현재 앱 HTML 가져오기
  let html=document.documentElement.outerHTML;

  // 모든 달 데이터 수집 (BUILTIN + localStorage 업로드분)
  const allMonths={...BUILTIN_MONTHS};
  getStoredMonths().forEach(m=>{
    const k=`${m.year}_${String(m.month).padStart(2,'0')}`;
    if(!allMonths[k]){
      const s=localStorage.getItem(empKey(m.year,m.month));
      if(s){try{allMonths[k]=JSON.parse(s);}catch(e){}}
    }
  });

  // BUILTIN_MONTHS 교체
  const newBuiltin=`// ── BUILT-IN MONTH DATA ──\nconst BUILTIN_MONTHS=${JSON.stringify(allMonths)};`;
  html=html.replace(/\/\/ ── BUILT-IN MONTH DATA ──[\s\S]*?const BUILTIN_MONTHS=\{[\s\S]*?\};/,newBuiltin);

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='근무표.html';a.click();
  URL.revokeObjectURL(url);
}

function updateHeaderStatus(){
  const name=getMyName();
  const bar=document.getElementById('h-my-bar');
  if(!name){bar.classList.remove('visible');document.querySelector('.tabs').classList.remove('with-bar');return;}
  const emp=EMP.find(e=>e.name===name);

  const t=tp(v,emp?.part||'');
  const clsMap={core:'bc',svc:'bs',night:'bn',rest:'br',vacation:'bv',gobul:'bg',work:'bw',trip:'bt'};
  const cl=clsMap[t]||'br';
  const shiftLabel={core:'주간근무',svc:'주간근무',night:'야근',rest:'숙휴',vacation:'휴가',gobul:'고불',off:'비번',holiday:'비번',work:'작업',trip:'출장'};

// ── HELPERS ──
function tp(v,part){
  if(!v||v==='공휴')return 'holiday';
  if(v==='비')return 'off';
  if(v.startsWith('휴가'))return 'vacation';
  if(v==='야'||v.startsWith('야('))return 'night';
  if(v==='숙')return 'rest';
  if(v==='고')return 'gobul';
  if(v==='출장')return 'trip';
  if(v==='작'||v==='작검'||v==='집작')return 'work';
  return part==='CORE'?'core':'svc';
}
function sh(v){
  if(!v||v==='공휴')return '공';if(v==='비')return '비';
  if(v.startsWith('휴가'))return '휴';
  if(v==='야'||v.startsWith('야('))return '야';
  if(v==='숙')return '숙';if(v==='고')return '고';if(v==='출장')return '출';
  if(v==='작검')return '검';if(v==='작')return '작';if(v==='집작')return '집';
  if(v==='주'||v.startsWith('주(')||v.startsWith('대체('))return '주';
  return v.slice(0,1);
}
function getNum(v){return(v==='1'||v==='2')?v:null;}
const PCLS={core:'cc',svc:'cs2',night:'cn',rest:'cr',vacation:'cv',gobul:'cg',work:'cw',trip:'ct',off:'co',holiday:'co'};
const DCOL={core:'#2563eb',svc:'#16a34a',night:'#7c3aed',rest:'#94a3b8',vacation:'#d97706',gobul:'#dc2626',work:'#0891b2',trip:'#9333ea'};

function groups(day){
  const g={core:[],svc:[],gobul:[],rest:[],night:[],vacation:[],work:[],trip:[]};
  EMP.forEach(e=>{
    const v=getVal(e.name,day);const t=tp(v,e.part);
    const num=getNum(v);const mod=isMod(e.name,day);
    if(g[t])g[t].push({name:e.name,v,num,mod});
  });
  Object.keys(g).forEach(k=>{g[k].sort((a,b)=>(a.num?+a.num:99)-(b.num?+b.num:99));});
  return g;
}

function msgText(day,g){
  const dow=DOW[(START+day-1)%7];
  let t=`[3/${day}[${dow}] 근무현황]`;
  const f=arr=>arr.map(e=>e.num?`${e.name}(${e.num})`:e.name).join(', ');
  if(g.core.length)t+=`\nㅇCore: ${f(g.core)}`;
  if(g.svc.length)t+=`\nㅇService: ${f(g.svc)}`;
  if(g.gobul.length)t+=`\nㅇ고불: ${f(g.gobul)}`;
  if(g.rest.length)t+=`\nㅇ숙휴: ${f(g.rest)}`;
  if(g.night.length)t+=`\nㅇ야근: ${f(g.night)}`;
  if(g.vacation.length)t+=`\nㅇ휴가: ${f(g.vacation)}`;
  if(g.work.length)t+=`\nㅇ작업: ${f(g.work)}`;
  if(g.trip.length)t+=`\nㅇ출장: ${f(g.trip)}`;
  return t;
}

function shiftRows(g){
  const myName=getMyName();
  const secs=[
    {k:'core',lbl:'Core',cl:'bc'},{k:'svc',lbl:'Service',cl:'bs'},
    {k:'gobul',lbl:'고불',cl:'bg'},{k:'rest',lbl:'숙휴',cl:'br'},
    {k:'night',lbl:'야근',cl:'bn'},{k:'vacation',lbl:'휴가',cl:'bv'},
    {k:'work',lbl:'작업',cl:'bw'},{k:'trip',lbl:'출장',cl:'bt'}
  ];
  let rows='';
  secs.forEach(s=>{
    if(!g[s.k].length)return;
    rows+=`<div class="shift-row"><div class="badge ${s.cl}">${s.lbl}</div><div class="chips">`;
    g[s.k].forEach(e=>{
      const isMe=myName&&e.name===myName;
      rows+=`<div class="chip${e.mod?' mod':''}${isMe?' mod':''}" style="${isMe?'border-color:var(--accent);background:var(--al);color:var(--accent);font-weight:800;':''}">${isMe?'⭐ ':''  }${e.name}${e.num?`<span class="chip-n">(${e.num})</span>`:''}</div>`;
    });
    rows+='</div></div>';
  });
  return rows||'<div class="shift-row" style="color:var(--text3);font-size:13px;padding:14px;">근무자 없음</div>';
}

// ── HISTORY ──
function openHist(){
  const ov=loadOv();
  const items=Object.entries(ov).sort((a,b)=>{
    const da=parseInt(a[0].split('_').pop());
    const db=parseInt(b[0].split('_').pop());
    return da-db;
  });
  const list=document.getElementById('hist-list');
  if(!items.length){
    list.innerHTML='<div class="hist-empty">긴급수정 이력이 없습니다</div>';
  } else {
    list.innerHTML='<div class="hist-list">'+items.map(([k,v])=>{
      const parts=k.split('_');
      const day=parts.pop();const name=parts.join('_');
      const dow=DOW[(START+parseInt(day)-1)%7];
      return `<div class="hist-item">
        <div class="hist-info">
          <div class="hist-date">${CUR_MONTH}월 ${day}일 (${dow}) · ${name}</div>
          <div class="hist-detail">${v.val}${v.memo?` — ${v.memo}`:''}</div>
        </div>
        <button class="hist-del" onclick="delHist('${k}')">삭제</button>
      </div>`;
    }).join('')+'</div>';
  }
  document.getElementById('hist-sheet').classList.add('open');
}
function closeHistSheet(e){if(e.target===document.getElementById('hist-sheet'))document.getElementById('hist-sheet').classList.remove('open');}
function delHist(key){
  const ov=loadOv();delete ov[key];saveOv(ov);
  openHist();
  if(activeTab==='daily')renderDaily(curDay);
  if(activeTab==='cal')renderCalendar();
  if(activeTab==='grid')renderGrid();
}

function chDay(d){const n=curDay+d;if(n>=1&&n<=DAYS)renderDaily(n);}
function dailyCopy(){
  const g=groups(curDay);
  navigator.clipboard.writeText(msgText(curDay,g)).then(()=>{
    const b=document.getElementById('d-cbtn');if(!b)return;
    b.textContent='✓ 복사됨';b.classList.add('done');
    setTimeout(()=>{b.textContent='문자 복사';b.classList.remove('done');},2000);
  });
}
function clearDayDaily(day){
  const ov=loadOv();
  Object.keys(ov).filter(k=>k.endsWith(`_${day}`)).forEach(k=>delete ov[k]);
  saveOv(ov);renderDaily(curDay);
  if(activeTab==='cal')renderCalendar();
  if(activeTab==='grid')renderGrid();
}

// ── CALENDAR TAB ──
function renderCalendar(){
  let h='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    h+=`<div class="cal-head${i===0?' hs':i===6?' hsa':''}">${d}</div>`;
  });
  for(let i=0;i<START;i++)h+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=DAYS;d++){
    const dow=(START+d-1)%7;
    let cl='cal-cell';
    if(d===TODAY)cl+=' istoday';
    if(dow===0)cl+=' cs';
    if(dow===6)cl+=' csa';
    if(d===selCalDay)cl+=' sel';
    // dots
    const dots=new Set();
    EMP.forEach(e=>{const t=tp(getVal(e.name,d),e.part);if(DCOL[t])dots.add(DCOL[t]);});
    const dotsH=[...dots].slice(0,5).map(c=>`<div class="cal-dot" style="background:${c}"></div>`).join('');
    h+=`<div class="${cl}" onclick="calClick(${d})"><div class="cal-n">${d}</div><div class="cal-dots">${dotsH}</div></div>`;
  }

  // inline detail
  let detail='';
  if(selCalDay){
    const g=groups(selCalDay);
    const dow=DOW[(START+selCalDay-1)%7];
    // override banner
    const ov=loadOv();
    const mods=Object.entries(ov).filter(([k])=>k.endsWith(`_${selCalDay}`));
    const banner=mods.length?`<div class="ov-banner"><div class="ob-l"><div class="ob-title">🔶 긴급수정 적용됨</div><div class="ob-list">${mods.map(([k,v])=>`${k.split('_')[0]} → ${v.val}`).join(' · ')}</div></div><button class="ob-clr" onclick="clearDay(${selCalDay})">되돌리기</button></div>`:'';
    detail=`${banner}<div class="cal-detail">
      <div class="cal-detail-head">
        <div class="cal-detail-title">${CUR_MONTH}월 ${selCalDay}일 (${dow}요일)</div>
        <div class="cal-detail-acts">
          <button class="cbtn" id="cal-cbtn" onclick="calCopy()">복사</button>
          <button class="cal-close" onclick="calClose()">✕</button>
        </div>
      </div>
      ${shiftRows(g)}
    </div>`;
  }

  document.getElementById('panel-cal').innerHTML=`
    <div class="cal-wrap">
      <div class="cal-month">${CUR_YEAR}년 ${CUR_MONTH}월</div>
      <div class="cal-grid">${h}</div>
      ${detail}

    </div>`;

  if(selCalDay){
    setTimeout(()=>{
      const det=document.querySelector('.cal-detail')||document.querySelector('.ov-banner');
      if(det)det.scrollIntoView({behavior:'smooth',block:'nearest'});
    },80);
  }
}

function calClick(d){
  selCalDay=(selCalDay===d)?null:d;
  smsDayOverride=selCalDay;
  renderCalendar();
}
function calClose(){selCalDay=null;smsDayOverride=null;renderCalendar();}
function calCopy(){
  const g=groups(selCalDay);
  navigator.clipboard.writeText(msgText(selCalDay,g)).then(()=>{
    const b=document.getElementById('cal-cbtn');if(!b)return;
    b.textContent='✓';b.classList.add('done');
    setTimeout(()=>{b.textContent='복사';b.classList.remove('done');},2000);
  });
}
function clearDay(day){
  const ov=loadOv();
  Object.keys(ov).filter(k=>k.endsWith(`_${day}`)).forEach(k=>delete ov[k]);
  saveOv(ov);renderCalendar();
  if(activeTab==='grid')renderGrid();
}

// ── GRID TAB ──
function renderGrid(){
  const filt=EMP.filter(e=>{
    if(gridFlt==='CORE')return e.part==='CORE';
    if(gridFlt==='SVC')return e.part==='SVC';
    if(gridFlt==='주간')return e.cat==='주간';
    if(gridFlt==='교대')return e.cat==='교대';
    return true;
  });

  const flts=['all','CORE','SVC','주간','교대'];
  const lbls={all:'전체',CORE:'CORE',SVC:'SVC','주간':'주간','교대':'교대'};
  const btns=flts.map(f=>`<button class="gflt${gridFlt===f?' on':''}" onclick="setGridFlt('${f}')">${lbls[f]}</button>`).join('');

  // Table header
  let thead='<thead><tr>';
  thead+=`<th class="col-name head"><div class="th-name">직원</div></th>`;
  for(let d=1;d<=DAYS;d++){
    const dow=(START+d-1)%7;
    const isTod=d===TODAY;
    const isSun=dow===0,isSat=dow===6;
    let cl='th-day';
    if(isTod)cl+=' th-today';
    else if(isSun)cl+=' th-sun';
    else if(isSat)cl+=' th-sat';
    thead+=`<th class="${cl}" onclick="gridDayClick(${d})" style="cursor:pointer;">
      <span class="th-day-num">${d}</span>
      <span class="th-day-dow">${DOW[dow]}</span>
    </th>`;
  }
  thead+='</tr></thead>';

  // Table body — CORE 먼저, SVC 나중에, 구분선 추가
  const coreEmps=filt.filter(e=>e.part==='CORE');
  const svcEmps=filt.filter(e=>e.part==='SVC');
  const showDivider=coreEmps.length>0&&svcEmps.length>0;

  function makeRows(emps){
    return emps.map(e=>{
      let row=`<tr>`;
      const isMe=getMyName()&&e.name===getMyName();
      row+=`<td class="td-name col-name" style="${isMe?'background:#eff6ff;':''}">${isMe?'⭐ ':''}${e.name}<span class="part-tag ${e.part==='CORE'?'ptc':'pts'}">${e.part}</span><span class="cat-tag">${e.cat}</span></td>`;
      for(let d=1;d<=DAYS;d++){
        const dow=(START+d-1)%7;
        const v=getVal(e.name,d);
        const t=tp(v,e.part);
      const isOff=(t==='off'||t==='holiday');
        const pc=PCLS[t]||'co';
        const label=sh(v);
        const isMe=getMyName()&&e.name===getMyName();
        const isT=d===TODAY;
        const isSun=dow===0,isSat=dow===6;
        const mod=isMod(e.name,d);
        let tdCl='td-cell';
        if(isT)tdCl+=' td-today';
        else if(isSun)tdCl+=' td-weekend-sun';
        else if(isSat)tdCl+=' td-weekend-sat';
        if(mod)tdCl+=' td-mod';
        row+=`<td class="${tdCl}" onclick="gridDayClick(${d})"><div class="cell-inner ${mod?'cmod':pc}">${label}</div></td>`;
      }
      row+='</tr>';
      return row;
    }).join('');
  }

  let tbody='<tbody>';
  tbody+=makeRows(coreEmps);
  if(showDivider){
    tbody+=`<tr class="tr-divider"><td class="col-name div-label">SVC</td>${Array.from({length:31},(_,i)=>`<td style="border-top:3px solid var(--border2);background:#f8fafc;"></td>`).join('')}</tr>`;
  }
  tbody+=makeRows(svcEmps);
  tbody+='</tbody>';

  document.getElementById('panel-grid').innerHTML=`
    <div class="grid-wrap">
      <div class="grid-controls">${btns}</div>
      <div class="grid-container">
        <table>${thead}${tbody}</table>
      </div>
      <div style="margin-top:10px;font-size:11px;color:var(--text3);font-weight:600;">💡 날짜 누르면 그날 근무현황 확인</div>
    </div>`;

  // scroll to today
  setTimeout(()=>{
    const todayTd=document.querySelector('.td-today');
    if(todayTd)todayTd.scrollIntoView({inline:'center',block:'nearest'});
  },60);
}

function setGridFlt(f){gridFlt=f;renderGrid();}

function gridDayClick(day){
  popupDay=day;
  smsDayOverride=day;
  const g=groups(day);
  const dow=DOW[(START+day-1)%7];
  document.getElementById('popup-title').textContent=`${CUR_MONTH}월 ${day}일 (${dow}요일)`;
  document.getElementById('popup-body').innerHTML=shiftRows(g);
  document.getElementById('day-popup').style.display='block';
}
function closePopup(){
  document.getElementById('day-popup').style.display='none';
  popupDay=null;
}
function popupCopy(){
  if(!popupDay)return;
  const g=groups(popupDay);
  navigator.clipboard.writeText(msgText(popupDay,g)).then(()=>{
    const b=document.getElementById('popup-copy');
    b.textContent='✓';b.classList.add('done');
    setTimeout(()=>{b.textContent='복사';b.classList.remove('done');},2000);
  });
}

// ── SMS ──
function openSMS(){
  const day=activeTab==='daily'?curDay:(smsDayOverride||TODAY);
  const g=groups(day);
  const dow=DOW[(START+day-1)%7];
  document.getElementById('sheet-title').textContent=`${CUR_MONTH}월 ${day}일 (${dow}) 문자`;
  document.getElementById('sheet-body').textContent=msgText(day,g);
  document.getElementById('sms-sheet').classList.add('open');
}
function closeSheet(e){if(e.target===document.getElementById('sms-sheet'))document.getElementById('sms-sheet').classList.remove('open');}
function sheetCopy(){
  const text=document.getElementById('sheet-body').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById('sheet-copy');
    b.textContent='✓ 복사됨';b.classList.add('done');
    setTimeout(()=>{b.textContent='복사';b.classList.remove('done');},2000);
  });
}

// ── EDIT ──
function openEdit(){
  const ds=document.getElementById('e-day');ds.innerHTML='';
  for(let d=1;d<=DAYS;d++){
    const o=document.createElement('option');
    o.value=d;o.textContent=`${CUR_MONTH}월 ${d}일 (${DOW[(START+d-1)%7]})`;
    if(d===(activeTab==='daily'?curDay:selCalDay||popupDay||TODAY))o.selected=true;
    ds.appendChild(o);
  }
  document.getElementById('e-name').innerHTML=EMP.map(e=>`<option value="${e.name}">${e.name} (${e.part})</option>`).join('');
  document.getElementById('e-memo').value='';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(e){if(e.target===document.getElementById('edit-modal'))closeEditDirect();}
function closeEditDirect(){document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){
  const day=parseInt(document.getElementById('e-day').value);
  const name=document.getElementById('e-name').value;
  const val=document.getElementById('e-val').value;
  const memo=document.getElementById('e-memo').value;
  const ov=loadOv();ov[`${name}_${day}`]={val,memo,ts:Date.now()};saveOv(ov);
  closeEditDirect();
  updateHeaderStatus();
  if(activeTab==='daily')renderDaily(curDay);
  if(activeTab==='cal')renderCalendar();
  if(activeTab==='grid')renderGrid();
}

// ── NAV ──
function switchTab(tab){
  activeTab=tab;
  closePopup();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  window.scrollTo(0,0);
  if(tab==='daily')renderDaily(curDay);
  if(tab==='grid')renderGrid();
  if(tab==='cal')renderCalendar();
}
function goToday(){
  const now=new Date();
  const realYear=now.getFullYear();
  const realMonth=now.getMonth()+1;
  const realDay=now.getDate();
  // 현재 보고있는 달이 오늘 달과 다르면 먼저 오늘 달로 이동
  if(CUR_YEAR!==realYear||CUR_MONTH!==realMonth){
    switchMonth(realYear,realMonth);
  }
  smsDayOverride=realDay;
  if(activeTab==='daily'){renderDaily(realDay);}
  else if(activeTab==='cal'){selCalDay=realDay;renderCalendar();}
  else{gridDayClick(realDay);}
}

// ── INIT ──
document.addEventListener('click', ()=>closeAdminMenu());
renderMonthNav();
updateHeaderStatus();
renderDaily(TODAY);
renderCalendar();
if(!getMyName()) setTimeout(()=>openSetup(),400);
</script>
